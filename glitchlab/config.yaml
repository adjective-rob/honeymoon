# ============================================================
# GLITCHLAB Configuration
# "Build Weird. Ship Clean."
# ============================================================

# Model routing — agents never know which vendor backs them.
# Names here map to LiteLLM model aliases.
routing:
  planner: "gemini/gemini-3-flash-preview"
  implementer: "gemini/gemini-3-flash-preview"
  debugger: "gemini/gemini-3-flash-preview"
  auditor: "gemini/gemini-3-flash-preview"
  security: "gemini/gemini-3-flash-preview"
  release: "gemini/gemini-3-flash-preview"
  archivist: "gemini/gemini-3-flash-preview"
  testgen: "gemini/gemini-3-flash-preview"

fallbacks:
  high_tier: "gemini/gemini-3-flash-preview"
  low_tier: "gemini/gemini-3-flash-preview"

# Budget + safety limits per task
limits:
  max_fix_attempts: 4
  max_tokens_per_task: 1000000
  max_dollars_per_task: 10.0
  require_plan_review: true
  require_pr_review: true

# Human intervention gates
intervention:
  pause_after_plan: true
  pause_before_pr: true
  pause_on_core_change: true
  pause_on_budget_exceeded: true

# Workspace isolation
workspace:
  worktree_dir: ".glitchlab/worktrees"
  task_dir: ".glitchlab/tasks"
  log_dir: ".glitchlab/logs"

# Tool allowlist — only these commands may be executed by agents.
# Patterns are prefix-matched. No shell expansion.
allowed_tools:
  - "cargo test"
  - "cargo fmt"
  - "cargo clippy"
  - "cargo build"
  - "cargo check"
  - "npm test"
  - "npm run lint"
  - "npm run build"
  - "python -m pytest"
  - "python -m ruff"
  - "python -c"
  - "python -"
  - "pip install"
  - "go test"
  - "go build"
  - "go vet"
  - "git diff"
  - "git add"
  - "git commit"
  - "git status"
  - "git log"
  - "gh pr create"
  - "gh issue view"
  - "gh issue list"
  - "make"
  - "prelude export"
  - "prelude update"
  - "ls"
  - "cat"
  - "head"

# Blocked patterns — these are never allowed regardless of allowlist.
blocked_patterns:
  - "rm -rf"
  - "curl"
  - "wget"
  - "sudo"
  - "> /dev"
  - "| bash"
  - "eval("
  - "exec("

# Boundary protection rules
boundaries:
  # Paths that require --allow-core flag
  protected_paths: []
  # Example for Zephyr:
  # - "crates/zephyr-core"
  # - "crates/zephyr-envelope"

context:
  brain: ~/.glitchlab/brain
  min_version: "1.2.0"

automation:
  rebase_before_pr: true
  auto_merge_pr: false

# DevSecOps pipeline — declarative step sequence.
# Matches the controller's hardcoded order: Plan → Implement → Debug → Testgen → Security → Release → Archivist.
pipeline:
  - name: planner
    agent_role: planner
    required: true
    fallback_tier: high
    reads: [task_description, repo_structure]
    writes: [plan_steps, files_in_scope, estimated_complexity]

  - name: implementer
    agent_role: implementer
    required: true
    fallback_tier: high
    reads: [plan_steps, files_in_scope]
    writes: [files_modified, files_created, commit_message]

  - name: debugger
    agent_role: debugger
    required: true
    fallback_tier: high
    skip_if: [doc_only, no_test_command]
    reads: [test_output, files_modified]
    writes: [debug_attempts, test_passing]

  - name: testgen
    agent_role: testgen
    required: true
    fallback_tier: low
    skip_if: [doc_only]
    reads: [files_modified, files_created]
    writes: [tests_added]

  - name: security
    agent_role: security
    required: true
    fallback_tier: low
    skip_if: [doc_only]
    reads: [files_modified, files_created]
    writes: [security_verdict]

  - name: release
    agent_role: release
    required: true
    fallback_tier: low
    skip_if: [doc_only]
    reads: [files_modified, commit_message]
    writes: [version_bump, changelog_entry]

  - name: archivist
    agent_role: archivist
    required: false
    fallback_tier: low
    reads: [plan_steps, files_modified, security_verdict]
    writes: [adr_content]