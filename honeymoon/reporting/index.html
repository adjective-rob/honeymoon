const { useState, useMemo, useRef } = React;

// ---------------------------------------------------------------------------
// Event Parsing
// ---------------------------------------------------------------------------

function parseEvents(rawLines) {
  const events = [];
  for (const line of rawLines) {
    try {
      const envelope = typeof line === 'string' ? JSON.parse(line) : line;
      const inner = JSON.parse(envelope.payload);
      events.push({ ...inner, _envelope: { label: envelope.label, signature: envelope.signature, signer: envelope.signer, timestamp: envelope.timestamp }});
    } catch(e) {}
  }
  return events;
}

function groupByRun(events) {
  const runs = {};
  for (const ev of events) {
    const rid = ev.run_id || '_orphan';
    if (!runs[rid]) runs[rid] = { id: rid, events: [], startTime: null, endTime: null, taskId: '', objective: '', status: '', qualityScore: null };
    runs[rid].events.push(ev);
    if (ev.event_type === 'run.started') { runs[rid].startTime = ev.timestamp; runs[rid].taskId = ev.payload?.task_id || ''; runs[rid].objective = ev.payload?.objective || ''; }
    if (ev.event_type === 'run.completed') { runs[rid].endTime = ev.timestamp; runs[rid].status = ev.payload?.status || 'unknown'; runs[rid].qualityScore = ev.metadata?.quality_score || null; }
  }
  return Object.values(runs).sort((a, b) => (b.startTime || '').localeCompare(a.startTime || ''));
}

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------

const AGENT_COLORS = {
  system:'#8A7D65', controller:'#D4B56A', planner:'#D4B56A', implementer:'#FBBF24',
  debugger:'#ef4444', security:'#4ADE80', release:'#06b6d4', archivist:'#a855f7',
  testgen:'#14b8a6',
};

const EVENT_ICONS = {
  'run.started':'>', 'run.completed':'=',
  'action.started':'>', 'action.completed':'v',
  'pipeline.step_started':'*', 'pipeline.step_completed':'o', 'pipeline.step_skipped':'-',
  'plan_created':'P', 'implementation_created':'I', 'tests_passed':'T', 'tests_failed':'X',
  'debug_completed':'D', 'testgen_created':'G', 'security_review':'S', 'release_assessment':'R',
  'workspace_created':'W', 'repo_indexed':'F', 'prelude_constraints_loaded':'C',
  'core_override':'!', 'boundary_violation':'B',
};

// Pipeline-internal events (emitted via emit_event) -- show with richer context
const PIPELINE_EVENTS = new Set([
  'plan_created', 'implementation_created', 'tests_passed', 'tests_failed',
  'debug_completed', 'testgen_created', 'security_review', 'release_assessment',
  'workspace_created', 'repo_indexed', 'prelude_constraints_loaded',
  'core_override', 'boundary_violation',
]);

const STATUS_COLORS = {
  pr_created:'#4ADE80', merged:'#4ADE80', committed:'#FBBF24',
  security_blocked:'#F87171', security_failed:'#F87171', tests_failed:'#F87171',
  plan_failed:'#8A7D65', error:'#F87171', budget_exceeded:'#FBBF24',
};

// ---------------------------------------------------------------------------
// Formatters
// ---------------------------------------------------------------------------

function formatTime(ts) { if (!ts) return '--'; try { return new Date(ts).toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}); } catch{return ts;} }
function formatDate(ts) { if (!ts) return '--'; try { return new Date(ts).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); } catch{return ts;} }
function duration(s,e) { if(!s||!e)return '--'; const ms=new Date(e)-new Date(s); if(ms<1000)return ms+'ms'; if(ms<60000)return (ms/1000).toFixed(1)+'s'; return (ms/60000).toFixed(1)+'m'; }

function eventSummary(ev) {
  const p = ev.payload || {};
  switch(ev.event_type) {
    case 'plan_created': return `${p.steps||0} steps, risk=${p.risk||'?'}`;
    case 'implementation_created': return `${p.changes||0} changes, ${p.tests||0} tests`;
    case 'tests_passed': return `attempt ${p.attempt||'?'}`;
    case 'tests_failed': return `attempt ${p.attempt||'?'}`;
    case 'debug_completed': return `${p.status||'?'} -- ${(p.diagnosis||'').slice(0,60)}`;
    case 'testgen_created': return p.file||'';
    case 'security_review': return `verdict=${p.verdict||'?'}, ${p.issues_count||0} issues`;
    case 'release_assessment': return `bump=${p.version_bump||'none'}`;
    case 'repo_indexed': return `${p.total_files||0} files`;
    case 'prelude_constraints_loaded': return `${p.count||0} constraints`;
    case 'boundary_violation': return p.error||'';
    case 'core_override': return (p.files||[]).join(', ');
    case 'pipeline.step_started': return `${p.agent_role||'?'}`;
    case 'pipeline.step_completed': return `${p.agent_role||'?'} -> ${p.status||'?'}`;
    case 'pipeline.step_skipped': return `${p.agent_role||'?'} (${p.skip_reason||'?'})`;
    case 'action.completed': return p.command||'';
    case 'action.started': return p.command||'';
    default: return '';
  }
}

// ---------------------------------------------------------------------------
// Components
// ---------------------------------------------------------------------------

function SignatureBadge({sig}) {
  const short = sig ? sig.slice(0,12)+'...' : 'unsigned';
  const has = !!sig;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:2,background:has?'rgba(74,222,128,0.1)':'rgba(248,113,113,0.1)',border:'1px solid '+(has?'rgba(74,222,128,0.3)':'rgba(248,113,113,0.3)'),fontSize:11,fontFamily:"'JetBrains Mono',monospace",color:has?'#4ADE80':'#F87171'}}>
    <span style={{fontSize:10}}>{has?'S':'!'}</span>{short}
  </span>;
}

function AgentBadge({agent}) {
  const c = AGENT_COLORS[agent]||'#8A7D65';
  return <span style={{display:'inline-block',padding:'1px 8px',borderRadius:2,background:c+'22',border:'1px solid '+c+'55',fontSize:11,fontWeight:600,color:c,textTransform:'uppercase',letterSpacing:'0.05em'}}>{agent}</span>;
}

function StatusBadge({status}) {
  const c = STATUS_COLORS[status]||'#8A7D65';
  return <span style={{display:'inline-block',padding:'2px 10px',borderRadius:2,background:c+'22',border:'1px solid '+c+'55',fontSize:11,fontWeight:700,color:c,textTransform:'uppercase',letterSpacing:'0.08em'}}>{status||'in-progress'}</span>;
}

function QualityGauge({score}) {
  if(!score)return null;
  const v=score.score||0;
  const c=v>=80?'#4ADE80':v>=50?'#FBBF24':'#F87171';
  return <div style={{display:'flex',alignItems:'center',gap:8}}>
    <div style={{width:120,height:6,borderRadius:2,background:'#2A2720',overflow:'hidden'}}>
      <div style={{width:v+'%',height:'100%',borderRadius:2,background:'linear-gradient(90deg,'+c+'88,'+c+')',transition:'width 0.6s ease'}}/>
    </div>
    <span className="mono" style={{fontSize:13,fontWeight:700,color:c}}>{v}/100</span>
  </div>;
}

function EventTypeBadge({type}) {
  const isPipeline = PIPELINE_EVENTS.has(type);
  const isStep = type.startsWith('pipeline.step_');
  const isAction = type.startsWith('action.');
  const isRun = type.startsWith('run.');

  let bg, border, color;
  if (isRun) { bg='rgba(212,181,106,0.1)'; border='rgba(212,181,106,0.3)'; color='#D4B56A'; }
  else if (isPipeline) { bg='rgba(99,102,241,0.1)'; border='rgba(99,102,241,0.3)'; color='#a5b4fc'; }
  else if (isStep) { bg='rgba(139,92,246,0.1)'; border='rgba(139,92,246,0.3)'; color='#c4b5fd'; }
  else if (isAction) { bg='rgba(59,130,246,0.08)'; border='rgba(59,130,246,0.25)'; color='#93c5fd'; }
  else { bg='rgba(138,125,101,0.08)'; border='rgba(138,125,101,0.2)'; color='#B8A880'; }

  return <span className="mono" style={{fontSize:11,padding:'1px 6px',borderRadius:2,background:bg,border:'1px solid '+border,color}}>{type}</span>;
}

// ---------------------------------------------------------------------------
// Pipeline Progress Bar -- shows which agents fired for a run
// ---------------------------------------------------------------------------

function PipelineBar({events}) {
  const PIPELINE_ORDER = ['planner','implementer','debugger','testgen','security','release','archivist'];
  const completed = new Set();
  const skipped = new Set();

  for (const ev of events) {
    if (ev.event_type === 'pipeline.step_completed') completed.add(ev.payload?.agent_role);
    if (ev.event_type === 'pipeline.step_skipped') skipped.add(ev.payload?.agent_role);
  }

  return <div style={{display:'flex',gap:2,alignItems:'center'}}>
    {PIPELINE_ORDER.map(role => {
      const c = AGENT_COLORS[role]||'#8A7D65';
      const done = completed.has(role);
      const skip = skipped.has(role);
      const opacity = done ? 1 : skip ? 0.3 : 0.1;
      return <div key={role} title={`${role}${skip?' (skipped)':done?' (done)':''}`} style={{
        width:32, height:6, borderRadius:2,
        background: skip ? `repeating-linear-gradient(90deg,${c}44 0px,${c}44 3px,transparent 3px,transparent 6px)` : c,
        opacity,
        transition:'opacity 0.3s',
      }}/>;
    })}
  </div>;
}

// ---------------------------------------------------------------------------
// Event Row
// ---------------------------------------------------------------------------

function EventRow({ev, isLast}) {
  const [expanded, setExpanded] = useState(false);
  const icon = EVENT_ICONS[ev.event_type] || '.';
  const isError = ev.payload?.returncode && ev.payload.returncode !== 0;
  const summary = eventSummary(ev);

  return <div style={{position:'relative',paddingLeft:28}}>
    {!isLast && <div style={{position:'absolute',left:9,top:20,bottom:-4,width:1,background:'#3D382E'}}/>}

function RunCard({run}) {

  const errorCount = run.events.filter(e => e.payload?.returncode && e.payload.returncode !== 0).length;

  const secReview = run.events.find(e => e.event_type === 'security_review');
  const relAssess = run.events.find(e => e.event_type === 'release_assessment');
  const testResult = run.events.find(e => e.event_type === 'tests_passed' || e.event_type === 'tests_failed');

      <div style={{display:'flex',gap:24,marginBottom:16,padding:'10px 14px',background:'#2A2720',borderRadius:2,flexWrap:'wrap'}}>

    </div>}
  </div>;
}

function PostureChart({entries}) {
  if (!entries || entries.length === 0) return null;
  const maxScore = 100;
  const w = 600;
  const h = 120;
  const padding = 30;
  const chartW = w - padding * 2;
  const chartH = h - padding;

  const points = entries.map((e, i) => {
    const x = padding + (i / Math.max(entries.length - 1, 1)) * chartW;
    const y = padding + chartH - (e.posture_score / maxScore) * chartH;
    return { x, y, score: e.posture_score, run: i + 1 };
  });

  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const lastScore = points[points.length - 1]?.score || 0;
  const scoreColor = lastScore >= 70 ? '#4ADE80' : lastScore >= 40 ? '#FBBF24' : '#F87171';

  return <svg width={w} height={h} style={{display:'block',margin:'0 auto'}}>
    {/* Grid lines */}
    {[0, 25, 50, 75, 100].map(v => {
      const y = padding + chartH - (v / maxScore) * chartH;
      return <g key={v}>
        <line x1={padding} y1={y} x2={w - padding} y2={y} stroke="#3D382E" strokeWidth={1}/>
        <text x={padding - 4} y={y + 3} textAnchor="end" fill="#8A7D65" fontSize={9} fontFamily="JetBrains Mono">{v}</text>
      </g>;
    })}
    {/* Line */}
    <path d={pathD} fill="none" stroke={scoreColor} strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"/>
    {/* Dots */}
    {points.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r={3} fill={scoreColor} stroke="#141414" strokeWidth={1.5}/>)}
    {/* Current score */}
    <text x={w - padding + 6} y={points[points.length - 1]?.y + 4 || 0} fill={scoreColor} fontSize={14} fontWeight={700} fontFamily="JetBrains Mono">{lastScore}</text>
  </svg>;
}

function HardeningTab({entries}) {

        {latest.resolved_count > 0 && <div>

        {e.resolved_count > 0 && <span style={{color:'#4ADE80',fontSize:11}}>-{e.resolved_count} resolved</span>}
        <span className="mono" style={{color:'#8A7D65',fontSize:11}}>${(e.cost||0).toFixed(3)}</span>
        <span style={{color:e.signature?'#4ADE80':'#8A7D65',fontSize:10}}>{e.signature?'signed':''}</span>
      </div>;
    })}
  </div>;
}

      for (const ch of text) { buffer += ch; if (ch === '{') depth++; if (ch === '}') depth--; if (depth === 0 && buffer.trim()) { lines.push(buffer.trim()); buffer = ''; } }
      if (buffer.trim()) lines.push(buffer.trim());

      <div style={{display:'flex',gap:2,marginBottom:24}}>
        {[{id:'attestation',label:'Attestation'},{id:'findings',label:'Findings'},{id:'hardening',label:'Hardening'}].map(t =>
          <button key={t.id} onClick={()=>setTab(t.id)} style={{padding:'10px 20px',borderRadius:2,border:'1px solid '+(tab===t.id?'rgba(212,181,106,0.4)':'#3D382E'),background:tab===t.id?'rgba(212,181,106,0.1)':'#181816',color:tab===t.id?'#D4B56A':'#8A7D65',fontSize:13,fontWeight:600,cursor:'pointer',transition:'all 0.2s',fontFamily:"'Outfit',sans-serif"}}>
            {t.label} {t.id==='findings' && reports.length > 0 ? <span className="mono" style={{marginLeft:4,fontSize:11}}>({reports.length})</span> : null}
          </button>
        )}
      </div>

      {tab === 'attestation' && <>
      {/* Stats Bar */}
      <div style={{display:'flex',gap:1,marginBottom:24,borderRadius:2,overflow:'hidden',border:'1px solid #3D382E'}}>
        {[
          {label:'Runs', value:totalRuns, color:'#D4B56A'},
          {label:'Events', value:totalEvents, color:'#D4B56A'},
          {label:'Signed', value:signedCount, color:'#4ADE80'},
          {label:'Signers', value:signers.length, color:'#D4B56A'},
          {label:'Source', value:rawLines ? 'audit.jsonl' : 'no data', color:'#8A7D65'},
        ].map(({label, value, color}) =>
          <div key={label} style={{flex:1,padding:'14px 16px',background:'#181816'}}>
            <div style={{fontSize:10,color:'#8A7D65',textTransform:'uppercase',letterSpacing:'0.1em',marginBottom:4}}>{label}</div>
            <div className="mono" style={{fontSize:18,fontWeight:700,color}}>{value}</div>
          </div>
        )}
      </div>

      {/* Filter */}
      <div style={{marginBottom:20}}>
        <input type="text" placeholder="Filter by task ID, objective, or status..." value={filter} onChange={e => setFilter(e.target.value)}
          style={{width:'100%',padding:'10px 14px',background:'#181816',border:'1px solid #3D382E',borderRadius:2,color:'#e5e7eb',fontSize:13,fontFamily:"'Outfit',sans-serif",outline:'none'}}
          onFocus={e => e.target.style.borderColor = 'rgba(212,181,106,0.4)'}
          onBlur={e => e.target.style.borderColor = '#3D382E'}/>
      </div>

      {/* Runs */}
      {filteredRuns.length === 0 ?
        <div style={{padding:48,textAlign:'center',color:'#8A7D65',border:'1px dashed #3D382E',borderRadius:2}}>
          <div style={{fontSize:14}}>{rawLines ? 'No matching runs' : 'Drop audit.jsonl to view the attestation trail'}</div>
        </div>
      : filteredRuns.map(run => <RunCard key={run.id} run={run}/>)}
      </>}

      {tab === 'findings' && <FindingsTab reports={reports}/>}

      {tab === 'hardening' && <HardeningTab entries={ledger}/>}

      {/* Footer */}
      <div style={{marginTop:40,paddingTop:20,borderTop:'1px solid #3D382E',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:11,color:'#8A7D65'}}>HONEYMOON Attestation Dashboard &middot; Zephyr SBOF</span>
        <span style={{fontSize:11,color:'#8A7D65'}}>Adjective LLC</span>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
