# ============================================================
# HONEYMOON Configuration
# "The Hive Mind Dev Engine"
# ============================================================

# Model routing — agents never know which vendor backs them.
# Default: nano for everything. Cheap, fast, runs anywhere.
# Override per-repo in .honeymoon/config.yaml for heavier models.
routing:
  planner: "openai/gpt-5.5-nano"
  implementer: "openai/gpt-5.5-nano"
  debugger: "openai/gpt-5.5-nano"
  auditor: "openai/gpt-5.5-nano"
  security: "openai/gpt-5.5-nano"
  release: "openai/gpt-5.5-nano"
  archivist: "openai/gpt-5.5-nano"
  testgen: "openai/gpt-5.5-nano"

fallbacks:
  high_tier: "openai/gpt-5.5-nano"
  low_tier: "openai/gpt-5.5-nano"

# Budget + safety limits per task
limits:
  max_fix_attempts: 3
  max_tokens_per_task: 200000
  max_dollars_per_task: 0.50
  require_plan_review: true
  require_pr_review: true

# Human intervention gates
intervention:
  pause_after_plan: true
  pause_before_pr: true
  pause_on_core_change: true
  pause_on_budget_exceeded: true

# Workspace isolation
workspace:
  worktree_dir: ".honeymoon/worktrees"
  task_dir: ".honeymoon/tasks"
  log_dir: ".honeymoon/logs"

# Tool allowlist — only these commands may be executed by agents.
# Patterns are prefix-matched. No shell expansion.
allowed_tools:
  - "cargo test"
  - "cargo fmt"
  - "cargo clippy"
  - "cargo build"
  - "cargo check"
  - "npm test"
  - "npm run lint"
  - "npm run build"
  - "python -m pytest"
  - "python -m ruff"
  - "python -c"
  - "python -"
  - "pip install"
  - "go test"
  - "go build"
  - "go vet"
  - "git diff"
  - "git add"
  - "git commit"
  - "git status"
  - "git log"
  - "gh pr create"
  - "gh issue view"
  - "gh issue list"
  - "make"
  - "prelude export"
  - "prelude update"
  - "ls"
  - "cat"
  - "head"

# Blocked patterns — these are never allowed regardless of allowlist.
blocked_patterns:
  - "rm -rf"
  - "curl"
  - "wget"
  - "sudo"
  - "> /dev"
  - "| bash"
  - "eval("
  - "exec("

# Boundary protection rules
boundaries:
  # Paths that require --allow-core flag
  protected_paths: []

context:
  brain: ~/.honeymoon/brain
  min_version: "1.2.0"

automation:
  rebase_before_pr: true
  auto_merge_pr: false

# Pipeline — Plan → Implement → Debug → Testgen → Security → Release → Archivist
pipeline:
  - name: planner
    agent_role: planner
    required: true
    fallback_tier: high
    reads: [task_description, repo_structure]
    writes: [plan_steps, files_in_scope, estimated_complexity]

  - name: implementer
    agent_role: implementer
    required: true
    fallback_tier: high
    reads: [plan_steps, files_in_scope]
    writes: [files_modified, files_created, commit_message]

  - name: debugger
    agent_role: debugger
    required: true
    fallback_tier: high
    skip_if: [doc_only, no_test_command]
    reads: [test_output, files_modified]
    writes: [debug_attempts, test_passing]

  - name: testgen
    agent_role: testgen
    required: true
    fallback_tier: low
    skip_if: [doc_only]
    reads: [files_modified, files_created]
    writes: [tests_added]

  - name: security
    agent_role: security
    required: true
    fallback_tier: low
    skip_if: [doc_only]
    reads: [files_modified, files_created]
    writes: [security_verdict]

  - name: release
    agent_role: release
    required: true
    fallback_tier: low
    skip_if: [doc_only]
    reads: [files_modified, commit_message]
    writes: [version_bump, changelog_entry]

  - name: archivist
    agent_role: archivist
    required: false
    fallback_tier: low
    reads: [plan_steps, files_modified, security_verdict]
    writes: [adr_content]
